<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPGE | Flows Dinâmico</title>
    <style>
        :root {
            --bg-dark: #0a0f18;
            --card-bg: #161d29;
            --border: #2d3748;
            --accent: #38bdf8;
            --text-bright: #e2e8f0;
            --text-dim: #94a3b8;
            --tag-systems: #8b5cf6;
            --tag-norms: #f59e0b;
            --tag-flow: #10b981;
            --tag-proc: #395dfc;
            --sidebar-width: 260px;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-bright);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- MENU LATERAL --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #0d131f;
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
        }

        .sidebar-title {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            padding-left: 10px;
        }

        .sidebar-link {
            color: var(--text-bright);
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .sidebar-link:hover { background: rgba(56, 189, 248, 0.05); color: var(--accent); }
        .sidebar-link.active {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            border-color: rgba(56, 189, 248, 0.3);
            font-weight: 600;
        }

        /* --- CONTEÚDO --- */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 20px 40px;
            box-sizing: border-box;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .brand-container { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 45px; width: auto; }
        .brand h1 { font-size: 1.4rem; margin: 0; }
        .brand h1 span { color: var(--accent); font-weight: bold; }
        
        .search-box {
            position: relative;
            max-width: 500px;
            margin: 0 auto 40px;
        }

        #searchInput {
            width: 100%;
            padding: 14px 25px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }

        .section-block { margin-bottom: 60px; }

        .section-title {
            color: var(--accent);
            font-size: 1.1rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .section-title::after { content: ""; height: 1px; background: var(--border); flex-grow: 1; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .card:hover { transform: translateY(-4px); border-color: var(--accent); }

        /* ESTILOS DAS TAGS - REPLICADOS DO ORIGINAL */
        .category-tag {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 12px;
            display: inline-block;
        }
        .tag-flow { background: rgba(16, 185, 129, 0.15); color: var(--tag-flow); border: 1px solid var(--tag-flow); }
        .tag-system { background: rgba(139, 92, 246, 0.15); color: var(--tag-systems); border: 1px solid var(--tag-systems); }
        .tag-normative { background: rgba(245, 158, 11, 0.15); color: var(--tag-norms); border: 1px solid var(--tag-norms); }
        .tag-process { background: rgba(244, 63, 94, 0.15); color: var(--tag-proc); border: 1px solid var(--tag-proc); }

        .card h3 { margin: 0 0 10px 0; font-size: 1.1rem; color: #fff; line-height: 1.4; }
        .card p { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }

        .btn-view {
            background: rgba(56, 189, 248, 0.08);
            color: var(--accent);
            text-decoration: none;
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid var(--accent);
            transition: 0.2s;
        }

        .btn-view:hover { background: var(--accent); color: var(--bg-dark); }

        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .main-wrapper { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-title">Menu Principal</div>
    <a onclick="setCategory('all')" id="btn-all" class="sidebar-link active">🏠 Início / Tudo</a>
    <a onclick="setCategory('fluxo')" id="btn-fluxo" class="sidebar-link">🌊 Fluxos</a>
    <a onclick="setCategory('sistema')" id="btn-sistema" class="sidebar-link">💻 Sistemas</a>
    <a onclick="setCategory('normativo')" id="btn-normativo" class="sidebar-link">📜 Normativos</a>
    <a onclick="setCategory('processo')" id="btn-processo" class="sidebar-link">📁 Processos</a>
</nav>

<div class="main-wrapper">
    <header>
        <div class="brand-container">
            <img id="logoUnifesp" class="logo-img" src="" alt="Logo PPGE">
            <div class="brand">
                <h1>PPGE<span>Flows</span></h1>
            </div>
        </div>
        <div style="font-size: 0.7rem; color: var(--text-dim);">v 3.0 (Dinâmico)</div>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="filter()" placeholder="Pesquisar...">
    </div>

    <div id="content-area">
        </div>

    <footer>&copy; 2026 PPGE UNIFESP | Maurício Massao Oura</footer>
</div>

<script src="assets.js"></script>

<script>
    if (window.LOGO_PPGE) { document.getElementById('logoUnifesp').src = window.LOGO_PPGE; }

    const secoes = [
        { id: 'fluxo', titulo: 'Fluxos', arquivo: 'fluxos.json', tagClass: 'tag-flow' },
        { id: 'sistema', titulo: 'Sistemas', arquivo: 'sistemas.json', tagClass: 'tag-system' },
        { id: 'normativo', titulo: 'Normativos', arquivo: 'normativos.json', tagClass: 'tag-normative' },
        { id: 'processo', titulo: 'Processos', arquivo: 'processos.json', tagClass: 'tag-process' }
    ];

    let currentCategory = 'all';

    // Função auxiliar para gerar o HTML dos cartões
    function renderCards(lista, tagClass, categoriaTitulo) {
        return lista.map(item => {
            // Define a cor e o texto do status apenas para processos
            const isProcesso = tagClass === 'tag-process';
            const corStatus = item.status === 'ativo' ? '#10b981' : '#f43f5e'; // Verde ou Vermelho
            const textoStatus = item.status === 'ativo' ? 'Ativo' : 'Inativo';

            return `
                <div class="card" style="${isProcesso ? `border-left: 4px solid ${corStatus};` : ''}">
                    <div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                            <span class="category-tag ${tagClass}">${categoriaTitulo.slice(0,-1)}</span>
                            ${isProcesso ? 
                                `<span style="color: ${corStatus}; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; gap: 4px;">
                                    <span style="width: 8px; height: 8px; background: ${corStatus}; border-radius: 50%; display: inline-block;"></span>
                                    ${textoStatus}
                                </span>` 
                                : ''
                            }
                        </div>
                        <h3>${item.titulo}</h3>
                        <p>${item.descricao}</p>
                    </div>
                    <a href="${item.link}" class="btn-view" target="_blank">${item.botao || 'ABRIR'}</a>
                </div>
            `;
        }).join('');
    }

    async function carregarDados() {
        const container = document.getElementById('content-area');
        container.innerHTML = '<p style="color: var(--text-dim)">Carregando dados...</p>';

        let fullHtml = '';

        for (const sec of secoes) {
            try {
                const response = await fetch(sec.arquivo);
                if (!response.ok) continue;
                
                const dados = await response.json();
                let conteudoSecao = '';

                // Lógica especial para a seção de Processos (Ativos/Inativos)
                if (sec.id === 'processo') {
                    const ativos = dados.filter(item => item.status === 'ativo');
                    const inativos = dados.filter(item => item.status === 'inativo');

                    conteudoSecao = `
                        <h3 style="color: var(--tag-flow); font-size: 0.85rem; margin: 20px 0 15px; letter-spacing: 1px;">🟢 ATIVOS</h3>
                        <div class="grid-container">${renderCards(ativos, sec.tagClass, sec.titulo)}</div>
                        
                        <h3 style="color: var(--text-dim); font-size: 0.85rem; margin: 40px 0 15px; letter-spacing: 1px;">⚪ INATIVOS / ARQUIVADOS</h3>
                        <div class="grid-container" style="opacity: 0.6;">${renderCards(inativos, sec.tagClass, sec.titulo)}</div>
                    `;
                } else {
                    // Renderização padrão para Fluxos, Sistemas e Normativos
                    conteudoSecao = `<div class="grid-container">${renderCards(dados, sec.tagClass, sec.titulo)}</div>`;
                }

                fullHtml += `
                    <div class="section-block" id="sec-${sec.id}">
                        <h2 class="section-title">${sec.titulo}</h2>
                        ${conteudoSecao}
                    </div>
                `;
            } catch (e) {
                console.error(`Erro ao carregar ${sec.arquivo}:`, e);
            }
        }
        
        container.innerHTML = fullHtml || '<p style="color: var(--tag-proc)">Erro ao carregar arquivos JSON.</p>';
        filter(); 
    }

    function setCategory(cat) {
    currentCategory = cat;

    // 1. Gerencia a aparência dos botões no menu lateral
    document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
    const btn = document.getElementById('btn-' + cat);
    if(btn) btn.classList.add('active');

    // 2. Se clicar em 'all', limpa o campo de busca
    if (cat === 'all') {
        document.getElementById('searchInput').value = '';
    }

    // 3. Aplica o filtro (que agora levará em conta o campo vazio se for 'all')
    filter();
    }

    function filter() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        let sections = document.querySelectorAll('.section-block');
        
        sections.forEach(section => {
            let sectionId = section.id.replace('sec-', '');
            let cards = section.querySelectorAll('.card');
            let hasVisibleCards = false;

            if (currentCategory === 'all' || currentCategory === sectionId) {
                section.style.display = "";
                cards.forEach(card => {
                    let txt = card.innerText.toLowerCase();
                    if (txt.includes(val)) {
                        card.style.display = "";
                        hasVisibleCards = true;
                    } else {
                        card.style.display = "none";
                    }
                });
                
                // Esconde a seção inteira se a busca não retornar nada nela
                if (!hasVisibleCards && val !== "") {
                    section.style.display = "none";
                }
            } else {
                section.style.display = "none";
            }
        });
    }

    carregarDados();
</script>

</body>
</html>
