<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPGE Flows - Acesso Restrito</title>
    <style>
        /* Estilos da Tela de Login */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 9999;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            text-align: center;
            width: 350px;
            border: 1px solid #333;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 16px;
            transition: 0.3s;
        }

        .google-btn:hover { background: #e5e5e5; }

        #errorMsg {
            color: #ff5252;
            background: rgba(255, 82, 82, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            font-size: 0.9em;
        }

        /* Estilo do Site */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        .nav { background: #004631; color: white; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; }
        .main-content { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .logout-link { color: #ff8787; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <h2 style="color: #4dabf7;">PPGE Flows</h2>
            <p style="color: #aaa;">Acesso permitido apenas para e-mails autorizados.</p>
            
            <button class="google-btn" onclick="login()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Entrar com Google
            </button>
            
            <div id="errorMsg"></div>
        </div>
    </div>

    <div class="nav">
        <span>PPGE - Unifesp</span>
        <span class="logout-link" onclick="sair()">Sair</span>
    </div>

    <div class="main-content">
        <h1>Fluxogramas Autorizados</h1>
        <hr>
        <div id="conteudo-fluxo">
            <p>Se você está vendo isso, seu e-mail foi autorizado pelo administrador.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlH7V0HX8qjt9fk70-5dz5benTFsAc8Rk",
            authDomain: "ppge-flows.firebaseapp.com",
            projectId: "ppge-flows",
            storageBucket: "ppge-flows.firebasestorage.app",
            messagingSenderId: "617698776322",
            appId: "1:617698776322:web:a6fe8feb21b97684a59e1b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ==========================================
        // LISTA DE E-MAILS AUTORIZADOS (A sua "Lista VIP")
        // ==========================================
        const listaBranca = [
            "mauricio.oura@unifesp.br",
            "mauricio.oura@gmail.com"
        ];

        window.login = function() {
            signInWithPopup(auth, provider).catch(err => console.error(err));
        };

        window.sair = function() {
            signOut(auth).then(() => window.location.reload());
        };

        onAuthStateChanged(auth, (user) => {
            const overlay = document.getElementById('loginOverlay');
            const errorDiv = document.getElementById('errorMsg');

            if (user) {
                const emailLogado = user.email.toLowerCase();

                // Verifica se o e-mail está na lista
                if (listaBranca.includes(emailLogado)) {
                    overlay.style.display = 'none'; // SUCESSO
                } else {
                    // E-MAIL NÃO AUTORIZADO
                    errorDiv.innerText = "O e-mail " + emailLogado + " não possui autorização de acesso.";
                    errorDiv.style.display = 'block';
                    signOut(auth);
                }
            } else {
                overlay.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
