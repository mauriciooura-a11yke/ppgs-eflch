<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Fluxos PPGs | EFLCH</title>
    <style>
        :root {
            --bg-dark: #0a0f18;
            --card-bg: #161d29;
            --border: #2d3748;
            --accent: #38bdf8;
            --text-bright: #e2e8f0;
            --text-dim: #94a3b8;
            --tag-systems: #8b5cf6;
            --tag-norms: #f59e0b;
            --tag-flow: #10b981;
            --tag-proc: #3b82f6;
            --sidebar-width: 280px;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-bright);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- MENU LATERAL --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #0d131f;
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .btn-reset-all {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.2s;
            text-align: center;
        }
        .btn-reset-all:hover { background: var(--accent); color: var(--bg-dark); }

        .sidebar-title {
            color: var(--text-dim);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 15px 0 10px;
            padding-left: 5px;
        }

        .ppg-selector {
            width: 100%;
            padding: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-bright);
            font-size: 0.9rem;
            margin-bottom: 20px;
            outline: none;
            cursor: pointer;
        }

        .sidebar-link {
            color: var(--text-bright);
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: 0.2s;
            cursor: pointer;
            margin-bottom: 4px;
            display: block;
        }
        .sidebar-link:hover { background: rgba(56, 189, 248, 0.05); }
        .sidebar-link.active {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            font-weight: 600;
        }

        /* --- CONTEÚDO CENTRAL --- */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 20px 40px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .brand h1 { font-size: 1.3rem; margin: 0; }
        .brand h1 span { color: var(--accent); }

        #searchInput {
            width: 100%;
            padding: 15px 25px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }
        #searchInput:focus { border-color: var(--accent); }

        .active-filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
            align-items: center;
            padding: 10px 5px;
            min-height: 45px;
        }
        .filter-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent);
            margin-right: 5px;
        }
        .filter-badge {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-bright);
        }
        .filter-badge span { font-weight: bold; color: white; }
        .filter-badge i { 
            cursor: pointer; 
            color: var(--text-dim); 
            font-style: normal; 
            font-weight: bold;
            font-size: 1.1rem;
            line-height: 1;
        }
        .filter-badge i:hover { color: #f43f5e; }

        .section-title {
            color: var(--accent);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after { content: ""; height: 1px; background: var(--border); flex-grow: 1; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .category-tag {
            font-size: 0.6rem;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 50px;
            text-transform: uppercase;
        }
        .tag-flow { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .tag-system { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }
        .tag-normative { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .tag-process { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }

        .card h3 { margin: 15px 0 10px; font-size: 1.1rem; line-height: 1.3; }
        .card p { font-size: 0.85rem; color: var(--text-dim); line-height: 1.6; flex-grow: 1; }

        .btn-view {
            text-decoration: none;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn-view:hover { filter: brightness(1.2); background: rgba(255,255,255,0.05); }

        footer { margin-top: 60px; padding: 40px; border-top: 1px solid var(--border); text-align: center; font-size: 0.8rem; color: var(--text-dim); }

        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .main-wrapper { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <button class="btn-reset-all" onclick="resetAllFilters()">🧹 Redefinir todos os filtros</button>

    <div class="sidebar-title">Selecione o PPG</div>
    <select id="ppgFilter" class="ppg-selector" onchange="filter()">
        <option value="all">Todos os PPGs</option>
    </select>

    <div class="sidebar-title">Categorias</div>
    <a onclick="setCategory('all')" id="btn-all" class="sidebar-link active">🏠 Ver Tudo</a>
    <a onclick="setCategory('fluxo')" id="btn-fluxo" class="sidebar-link">🌊 Fluxos</a>
    <a onclick="setCategory('sistema')" id="btn-sistema" class="sidebar-link">💻 Sistemas</a>
    <a onclick="setCategory('normativo')" id="btn-normativo" class="sidebar-link">📜 Normativos</a>
    <a onclick="setCategory('processo')" id="btn-processo" class="sidebar-link">📁 Processos</a>
</nav>

<div class="main-wrapper">
    <header>
        <div class="brand">
            <h1>Nexus PPGs<span>EFLCH-UNIFESP</span></h1>
        </div>
        <div style="font-size: 0.7rem; color: var(--text-dim);">v 4.5 | Repositório: ppgs-eflch</div>
    </header>

    <input type="text" id="searchInput" onkeyup="filter()" placeholder="Pesquise fluxos, sistemas ou processos...">
    
    <div id="activeFilters" class="active-filters-bar"></div>

    <div id="content-area"></div>

    <footer>&copy; 2026 UNIFESP | Desenvolvido por Maurício Massao Oura</footer>
</div>

<script src="assets.js"></script>

<script>
    const secoes = [
        { id: 'fluxo', titulo: 'Fluxos', arquivo: 'fluxos.json', tagClass: 'tag-flow' },
        { id: 'sistema', titulo: 'Sistemas', arquivo: 'sistemas.json', tagClass: 'tag-system' },
        { id: 'normativo', titulo: 'Normativos', arquivo: 'normativos.json', tagClass: 'tag-normative' },
        { id: 'processo', titulo: 'Processos', arquivo: 'processos.json', tagClass: 'tag-process' }
    ];

    let currentCategory = 'all';

    function getPPGColor(ppg) {
        const ppgLower = (ppg || '').toLowerCase();
        if (!ppg || ppgLower === 'geral' || ppgLower === 'todos') return '#94a3b8'; 
        
        const colors = ['#38bdf8', '#10b981', '#818cf8', '#fbbf24', '#2dd4bf', '#6366f1'];
        let hash = 0;
        for (let i = 0; i < ppg.length; i++) { hash = ppg.charCodeAt(i) + ((hash << 5) - hash); }
        return colors[Math.abs(hash) % colors.length];
    }

    function resetAllFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('ppgFilter').value = 'all';
        setCategory('all');
    }

    function updateFilterBadges() {
        const badgeContainer = document.getElementById('activeFilters');
        const ppg = document.getElementById('ppgFilter').value;
        const search = document.getElementById('searchInput').value;
        
        let badges = '';
        if (ppg !== 'all' || currentCategory !== 'all' || search !== '') {
            badges = '<span class="filter-label">Filtros aplicados -></span>';
            if (ppg !== 'all') badges += `<div class="filter-badge">PPG: <span>${ppg.toUpperCase()}</span> <i onclick="document.getElementById('ppgFilter').value='all'; filter();">×</i></div>`;
            if (currentCategory !== 'all') badges += `<div class="filter-badge">Tipo: <span>${currentCategory.toUpperCase()}</span> <i onclick="setCategory('all')">×</i></div>`;
            if (search) badges += `<div class="filter-badge">Busca: <span>"${search}"</span> <i onclick="document.getElementById('searchInput').value=''; filter();">×</i></div>`;
        }
        badgeContainer.innerHTML = badges;
    }

    function renderCards(lista, tagClass, categoriaTitulo) {
        return lista.map(item => {
            const ppgOriginal = (item.ppg || 'Geral');
            const ppgNome = ppgOriginal.toUpperCase();
            const ppgCor = getPPGColor(ppgOriginal);
            const isProc = tagClass === 'tag-process';
            const corStatus = item.status === 'ativo' ? '#10b981' : '#64748b';

            let tagsHtml = '';
            if (item.palavras_chave) {
                tagsHtml = `<div style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;">
                    ${item.palavras_chave.split(',').map(tag => `
                        <span style="font-size: 0.6rem; color: var(--text-dim); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px;">#${tag.trim()}</span>
                    `).join('')}
                </div>`;
            }

            return `
                <div class="card" data-ppg="${ppgOriginal.toLowerCase()}" style="border-top: 4px solid ${isProc ? corStatus : ppgCor}">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <span class="category-tag ${tagClass}">${categoriaTitulo.slice(0,-1)}</span>
                        <span style="font-size: 0.6rem; color: ${ppgCor}; border: 1px solid ${ppgCor}; padding: 1px 6px; border-radius: 4px; font-weight: bold;">${ppgNome}</span>
                    </div>
                    <h3>${item.titulo}</h3>
                    <p>${item.descricao}</p>
                    ${isProc ? `<div style="font-size: 0.65rem; font-weight: bold; color: ${corStatus}; margin: 10px 0;">● ${item.status.toUpperCase()}</div>` : ''}
                    ${tagsHtml}
                    <a href="${item.link}" class="btn-view" target="_blank" style="border-color: ${ppgCor}; color: ${ppgCor};">ABRIR</a>
                </div>
            `;
        }).join('');
    }

    async function carregarDados() {
        const container = document.getElementById('content-area');
        const ppgSelect = document.getElementById('ppgFilter');
        const ppgsEncontrados = new Set();
        
        container.innerHTML = '<p style="text-align:center; padding: 50px; color: var(--text-dim);">Carregando recursos...</p>';
        let fullHtml = '';

        for (const sec of secoes) {
            try {
                const response = await fetch(sec.arquivo);
                if (!response.ok) continue;
                const dados = await response.json();
                
                dados.forEach(item => { 
                    if(item.ppg && item.ppg.toLowerCase() !== 'geral') {
                        ppgsEncontrados.add(item.ppg.trim().toLowerCase());
                    }
                });

                let conteudo = `<div class="grid-container">${renderCards(dados, sec.tagClass, sec.titulo)}</div>`;
                
                if (sec.id === 'processo') {
                    const ativos = dados.filter(i => i.status === 'ativo');
                    const inativos = dados.filter(i => i.status === 'inativo');
                    conteudo = `
                        <h4 style="color: #10b981; font-size: 0.75rem; margin-bottom: 15px; letter-spacing: 1px;">● PROCESSOS EM VIGOR</h4>
                        <div class="grid-container">${renderCards(ativos, sec.tagClass, sec.titulo)}</div>
                        <h4 style="color: var(--text-dim); font-size: 0.75rem; margin: 30px 0 15px; letter-spacing: 1px;">○ ARQUIVADOS</h4>
                        <div class="grid-container" style="opacity: 0.6;">${renderCards(inativos, sec.tagClass, sec.titulo)}</div>
                    `;
                }

                fullHtml += `<div class="section-block" id="sec-${sec.id}"><h2 class="section-title">${sec.titulo}</h2>${conteudo}</div>`;
            } catch (e) { console.error(e); }
        }

        const currentVal = ppgSelect.value;
        ppgSelect.innerHTML = '<option value="all">Todos os PPGs</option>';
        Array.from(ppgsEncontrados).sort().forEach(p => ppgSelect.innerHTML += `<option value="${p}">${p.toUpperCase()}</option>`);
        ppgSelect.value = currentVal;
        container.innerHTML = fullHtml;
        filter();
    }

    function setCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
        document.getElementById('btn-' + cat).classList.add('active');
        filter();
    }

    function filter() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const selPPG = document.getElementById('ppgFilter').value.toLowerCase();
        const sections = document.querySelectorAll('.section-block');
        
        sections.forEach(section => {
            const sectionId = section.id.replace('sec-', '');
            const cards = section.querySelectorAll('.card');
            let hasVisible = false;

            if (currentCategory === 'all' || currentCategory === sectionId) {
                cards.forEach(card => {
                    const cardPPG = (card.getAttribute('data-ppg') || '').toLowerCase();
                    const txt = card.innerText.toLowerCase();
                    
                    const matchesPPG = (selPPG === 'all' || cardPPG === selPPG || cardPPG === 'geral');
                    const matchesSearch = txt.includes(val);

                    if (matchesPPG && matchesSearch) {
                        card.style.display = "";
                        hasVisible = true;
                    } else {
                        card.style.display = "none";
                    }
                });
                section.style.display = hasVisible ? "" : "none";
            } else {
                section.style.display = "none";
            }
        });
        updateFilterBadges();
    }

    carregarDados();
</script>

</body>
</html>
